{% extends 'base.html' %}

{% block pagetitle %}
Plant Disease Detection
{% endblock pagetitle %}

{% block body %}

<style>
    body {
        margin: 0;
        padding: 0;
        overflow: hidden;
    }

    .hero {
        height: 100vh;
        width: 100%;
        background-image: url('https://images.unsplash.com/photo-1501004318641-b39e6451bec6');
        background-size: cover;
        background-position: center;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .overlay {
        background: rgba(0, 0, 0, 0.5);
        padding: 40px;
        border-radius: 15px;
        text-align: center;
        color: white;
    }

    .btn-custom {
        margin-top: 20px;
        padding: 12px 25px;
        font-size: 18px;
        border-radius: 10px;
        background-color: #22c55e;
        border: none;
    }
</style>

<div class="hero">

    <div class="overlay">
        <h1 style="font-size: 3rem;">🌿 Plant Disease Detection</h1>
        <p>AI-powered analysis for healthy crops</p>

        <a href="/index">
            <button class="btn-custom">Start Analysis </button>
        </a>
    </div>

</div>

{% endblock body %}
