<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>
        {% block pagetitle %}{% endblock pagetitle %}
    </title>

    <style>
        body {
            background: linear-gradient(to right, #e6f4ea, #f0fdf4);
            min-height: 100vh;
        }

        .navbar {
            background-color: #05380b;
        }

        .navbar a {
            color: white !important;
            font-weight: 500;
        }

        .rounded-lg {
            border-radius: 15px;
        }

        .footer-basic {
            padding: 30px 0;
            background-color: #05380b;
            color: #f1f3f5;
            margin-top: 40px;
        }

        .footer-basic ul {
            list-style: none;
            text-align: center;
            padding: 0;
        }

        .footer-basic li {
            display: inline;
            margin: 0 10px;
        }

        .footer-basic a {
            color: white;
            text-decoration: none;
        }

        .footer-basic a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">

            <a class="navbar-brand" href="/">🌿 Plant AI</a>

            <div>
                <a class="nav-link d-inline" href="/">Home</a>
                <a class="nav-link d-inline" href="/index">AI Engine</a>
                <a class="nav-link d-inline" href="/market">Market</a>
                <a class="nav-link d-inline" href="/contact">Contact</a>
            </div>

        </div>
    </nav>

    <!-- PAGE CONTENT -->
    <div>
        {% block body %}
        {% endblock body %}
    </div>

    <!-- FOOTER -->
    <div class="footer-basic">
        <footer>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/index">AI Engine</a></li>
                <li><a href="/market">Market</a></li>
                <li><a href="/contact">Contact</a></li>
            </ul>
            <p class="text-center mt-2">Created by Sai Krishna Hari</p>
        </footer>
    </div>

    <!-- JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.0.0/js/bootstrap.bundle.min.js"></script>

</body>
</html>
